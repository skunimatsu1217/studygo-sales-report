<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタディGO 売上ダッシュボード</title>
<style>
:root{
  --primary:#4f46e5;--primary-light:#e0e7ff;--primary-dark:#3730a3;
  --success:#16a34a;--danger:#dc2626;--warn:#d97706;
  --teal:#0d9488;--teal-light:#ccfbf1;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;
  --shadow:0 1px 3px rgba(0,0,0,.1);--shadow-md:0 4px 6px rgba(0,0,0,.07);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1);--radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Hiragino Sans','Meiryo',sans-serif;background:var(--g100);color:var(--g800);}
.header{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;padding:20px 28px;}
.header h1{font-size:20px;font-weight:700;} .header p{font-size:12px;opacity:.8;margin-top:2px;}
.mode-bar{display:flex;gap:0;background:#fff;border-bottom:2px solid var(--g200);position:sticky;top:0;z-index:100;}
.mode-tab{flex:1;padding:14px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--g500);transition:all .15s;}
.mode-tab:hover{color:var(--primary);background:var(--primary-light);}
.mode-tab.active{color:var(--primary);border-bottom-color:var(--primary);background:#fff;}
.main{max-width:1600px;margin:0 auto;padding:16px;}
.panel{display:none;} .panel.active{display:block;}

/* Shared components */
.sel{padding:8px 10px;border:1px solid var(--g300);border-radius:8px;font-size:12px;background:#fff;cursor:pointer;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--primary-light);color:var(--primary);border-radius:20px;font-size:11px;font-weight:600;}
.badge.warn{background:#fef3c7;color:var(--warn);}
.toolbar{background:#fff;border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow);margin-bottom:14px;}
.toolbar-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.search-box{flex:1;min-width:180px;position:relative;}
.search-box input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--g300);border-radius:8px;font-size:13px;outline:none;}
.search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.12);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:14px;}

/* Store buttons */
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-top:12px;max-height:280px;overflow-y:auto;padding-right:4px;}
.store-grid::-webkit-scrollbar{width:5px;} .store-grid::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px;}
.store-btn{display:flex;flex-direction:column;padding:8px 12px;border:2px solid var(--g200);border-radius:8px;background:#fff;cursor:pointer;transition:all .12s;text-align:left;position:relative;}
.store-btn:hover{border-color:var(--primary);background:var(--primary-light);}
.store-btn.selected{border-color:var(--primary);background:var(--primary-light);box-shadow:0 0 0 2px rgba(79,70,229,.2);}
.store-btn.disabled{opacity:.35;cursor:not-allowed;}
.store-btn .s-name{font-size:12px;font-weight:600;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.store-btn .s-sub{font-size:10px;color:var(--g500);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.store-btn .s-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.store-btn .s-tag{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--g100);color:var(--g500);}
.store-btn .s-amount{font-size:13px;font-weight:700;color:var(--primary);margin-top:3px;}
.store-btn .s-check{position:absolute;top:5px;right:6px;width:18px;height:18px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;display:none;align-items:center;justify-content:center;}
.store-btn.selected .s-check{display:flex;}

/* Cards */
.compare-placeholder{background:#fff;border-radius:var(--radius);padding:40px;text-align:center;color:var(--g400);box-shadow:var(--shadow);}
.compare-grid{display:grid;gap:16px;}
.compare-grid.cols-1{grid-template-columns:1fr;} .compare-grid.cols-2{grid-template-columns:1fr 1fr;} .compare-grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
.store-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden;}
.card-header{padding:14px 18px;border-bottom:1px solid var(--g100);display:flex;justify-content:space-between;align-items:flex-start;}
.card-header .ch-name{font-size:15px;font-weight:700;color:var(--g900);}
.card-header .ch-corp{font-size:11px;color:var(--g500);margin-top:1px;}
.card-header .ch-close{width:26px;height:26px;border-radius:6px;border:none;background:var(--g100);cursor:pointer;font-size:15px;color:var(--g500);display:flex;align-items:center;justify-content:center;}
.card-header .ch-close:hover{background:var(--danger);color:#fff;}
.card-body{padding:14px 18px;}
.metric-section{margin-bottom:14px;}
.metric-section-title{font-size:11px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--g100);}
.metric-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.metric-row.cols-3{grid-template-columns:1fr 1fr 1fr;} .metric-row.cols-4{grid-template-columns:1fr 1fr 1fr 1fr;}
.metric{padding:8px;background:var(--g50);border-radius:7px;}
.metric .m-label{font-size:10px;color:var(--g500);margin-bottom:1px;}
.metric .m-value{font-size:16px;font-weight:700;color:var(--g900);}
.metric .m-value.sm{font-size:13px;}
.metric .m-sub{font-size:10px;color:var(--g400);margin-top:1px;}
.metric.hl{background:linear-gradient(135deg,#4f46e5,#7c3aed);}
.metric.hl .m-label{color:rgba(255,255,255,.7);} .metric.hl .m-value{color:#fff;} .metric.hl .m-sub{color:rgba(255,255,255,.6);}
.metric.teal{background:linear-gradient(135deg,#0d9488,#14b8a6);}
.metric.teal .m-label{color:rgba(255,255,255,.7);} .metric.teal .m-value{color:#fff;} .metric.teal .m-sub{color:rgba(255,255,255,.6);}

.month-bars{display:flex;flex-direction:column;gap:4px;}
.mb-row{display:flex;align-items:center;gap:6px;font-size:11px;}
.mb-row .mb-lbl{width:36px;color:var(--g500);text-align:right;flex-shrink:0;}
.mb-row .mb-trk{flex:1;height:20px;background:var(--g100);border-radius:4px;overflow:hidden;}
.mb-row .mb-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:600;color:#fff;min-width:fit-content;}
.mb-row .mb-fill.c0{background:linear-gradient(90deg,#6366f1,#818cf8);}
.mb-row .mb-fill.c1{background:linear-gradient(90deg,#8b5cf6,#a78bfa);}
.mb-row .mb-fill.c2{background:linear-gradient(90deg,#a855f7,#c084fc);}
.mb-row .mb-fill.cw{background:linear-gradient(90deg,#0d9488,#14b8a6);}
.mb-row .mb-val{width:72px;text-align:right;font-weight:600;color:var(--g700);flex-shrink:0;}
.mb-row .mb-cnt{width:36px;text-align:right;color:var(--g400);flex-shrink:0;}

.info-grid{display:grid;grid-template-columns:auto 1fr;gap:2px 10px;font-size:12px;}
.info-grid .il{color:var(--g500);} .info-grid .iv{color:var(--g800);font-weight:500;}
.plan-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.plan-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--primary-light);color:var(--primary);font-weight:600;}
.plan-tag.no{background:var(--g100);color:var(--g400);}

.growth{display:inline-flex;align-items:center;gap:2px;font-weight:600;font-size:12px;}
.growth.up{color:var(--success);} .growth.down{color:var(--danger);} .growth.flat{color:var(--g400);}

.assessment{margin-top:10px;padding:10px;border-radius:7px;font-size:12px;line-height:1.5;}
.assessment.good{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
.assessment.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;}
.assessment.bad{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
.assessment .a-title{font-weight:700;margin-bottom:2px;}

/* Ranking */
.rank-toolbar{background:#fff;border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow);margin-bottom:14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.rank-toolbar label{font-size:12px;color:var(--g600);font-weight:600;}
.filter-group{display:flex;align-items:center;gap:6px;}
.rank-section{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.rank-section .rs-header{padding:14px 18px;border-bottom:1px solid var(--g100);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.rank-section .rs-title{font-size:16px;font-weight:700;color:var(--g900);}
.rank-section .rs-sub{font-size:12px;color:var(--g500);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--g50);color:var(--g600);font-weight:600;padding:8px 10px;text-align:left;border-bottom:2px solid var(--g200);position:sticky;top:0;white-space:nowrap;}
td{padding:7px 10px;border-bottom:1px solid var(--g100);}
tr:hover{background:#f8f9ff;}
.r{text-align:right;} .c{text-align:center;}
.rank-num{font-weight:700;color:var(--primary);width:36px;text-align:center;}
.rank-1{color:#FFD700;font-size:16px;} .rank-2{color:#C0C0C0;font-size:15px;} .rank-3{color:#CD7F32;font-size:15px;}
.total-row{background:var(--primary-light)!important;font-weight:700;} .total-row td{border-top:2px solid var(--primary);}
.pref-badge{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--g100);color:var(--g600);}
.walk-badge{font-size:10px;padding:2px 6px;border-radius:4px;background:#dbeafe;color:#1d4ed8;}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px;}
.scard{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);text-align:center;}
.scard .sc-label{font-size:11px;color:var(--g500);margin-bottom:4px;}
.scard .sc-val{font-size:20px;font-weight:700;color:var(--g900);}
.scard .sc-sub{font-size:11px;color:var(--g400);margin-top:2px;}
.scard.hl{background:linear-gradient(135deg,#4f46e5,#7c3aed);}
.scard.hl .sc-label{color:rgba(255,255,255,.7);} .scard.hl .sc-val{color:#fff;} .scard.hl .sc-sub{color:rgba(255,255,255,.6);}

/* Analysis tab */
.analysis-section{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-md);padding:20px;margin-bottom:20px;}
.analysis-section h3{font-size:16px;font-weight:700;color:var(--g900);margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid var(--primary);}
.attr-grid{display:grid;gap:14px;margin-bottom:16px;}
.attr-grid.cols-2{grid-template-columns:1fr 1fr;}
.attr-grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
.attr-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr;}
.attr-card{border:1px solid var(--g200);border-radius:var(--radius);padding:16px;background:var(--g50);}
.attr-card .ac-title{font-size:14px;font-weight:700;color:var(--g800);margin-bottom:10px;text-align:center;}
.attr-card .ac-big{font-size:24px;font-weight:700;color:var(--primary);text-align:center;}
.attr-card .ac-sub{font-size:11px;color:var(--g500);text-align:center;margin-top:2px;}
.attr-card .ac-rows{margin-top:10px;display:flex;flex-direction:column;gap:4px;}
.attr-card .ac-row{display:flex;justify-content:space-between;font-size:12px;}
.attr-card .ac-row .ac-l{color:var(--g500);} .attr-card .ac-row .ac-v{font-weight:600;color:var(--g800);}
.attr-bar-wrap{margin-top:16px;}
.attr-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.attr-bar-track{height:28px;background:var(--g100);border-radius:6px;overflow:hidden;display:flex;}
.attr-bar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;min-width:30px;transition:width .4s;}
.attr-bar-seg:nth-child(1){background:#6366f1;} .attr-bar-seg:nth-child(2){background:#a855f7;}
.attr-bar-seg:nth-child(3){background:#ec4899;} .attr-bar-seg:nth-child(4){background:#f59e0b;}
.insight-box{margin-top:14px;padding:12px;border-radius:8px;font-size:13px;line-height:1.6;}
.insight-box.positive{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
.insight-box.neutral{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;}
.insight-box.negative{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
.insight-box strong{font-weight:700;}

@media(max-width:1000px){.compare-grid.cols-3,.compare-grid.cols-2{grid-template-columns:1fr;}.attr-grid.cols-2,.attr-grid.cols-3,.attr-grid.cols-4{grid-template-columns:1fr;}}
@media(max-width:700px){.store-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}.main{padding:10px;}}
</style>
</head>
<body>

<div class="header">
  <h1>スタディGO 売上ダッシュボード</h1>
  <p>データ最終日: 2026/3/2 ｜ テスト店舗・ベースポイント・法人名変更確認 除外済</p>
</div>

<div class="mode-bar">
  <div class="mode-tab active" onclick="switchMode('compare')">店舗比較</div>
  <div class="mode-tab" onclick="switchMode('ranking')">ランキング</div>
  <div class="mode-tab" onclick="switchMode('analysis')">属性分析</div>
</div>

<div class="main">

<!-- ==================== COMPARE ==================== -->
<div class="panel active" id="panel-compare">
  <div class="toolbar">
    <div class="toolbar-top">
      <div class="search-box"><span class="search-icon">&#128269;</span><input type="text" id="cmpSearch" placeholder="店舗名・法人名・都道府県で検索..."></div>
      <select class="sel" id="cmpSort">
        <option value="w1_desc">直近1週間売上↓</option>
        <option value="m3_desc">直近3ヶ月売上↓</option>
        <option value="total_desc">全期間売上↓</option>
        <option value="name">店舗名順</option>
      </select>
      <select class="sel" id="cmpPref"><option value="">都道府県: すべて</option></select>
      <select class="sel" id="cmpWalk"><option value="">徒歩: すべて</option><option value="3">3分以内</option><option value="5">5分以内</option><option value="10">10分以内</option></select>
      <select class="sel" id="cmpMonthly"><option value="">月額契約: すべて</option><option value="yes">あり</option><option value="no">なし</option></select>
      <select class="sel" id="cmpTime"><option value="">時間利用: すべて</option><option value="yes">あり</option><option value="no">なし</option></select>
      <div class="badge" id="cmpBadge">選択: 0 / 3</div>
    </div>
    <div class="store-grid" id="cmpGrid"></div>
  </div>
  <div id="cmpArea">
    <div class="compare-placeholder" id="cmpPlaceholder"><div style="font-size:36px;margin-bottom:10px;">&#9757;</div><div>上のボタンから店舗を選択（最大3店舗を横並び比較）</div></div>
    <div class="compare-grid" id="cmpCards" style="display:none;"></div>
  </div>
</div>

<!-- ==================== RANKING ==================== -->
<div class="panel" id="panel-ranking">
  <div class="rank-toolbar">
    <div class="filter-group"><label>期間:</label>
      <select class="sel" id="rkPeriod">
        <option value="1w">直近1週間 (2/24〜3/2)</option>
        <option value="3m">直近3ヶ月 (12〜2月)</option>
        <option value="2026-02">2026年2月</option>
        <option value="2026-01">2026年1月</option>
        <option value="2025-12">2025年12月</option>
        <option value="2025-11">2025年11月</option>
        <option value="2025-10">2025年10月</option>
        <option value="all">全期間</option>
      </select>
    </div>
    <div class="filter-group"><label>都道府県:</label><select class="sel" id="rkPref"><option value="">すべて</option></select></div>
    <div class="filter-group"><label>徒歩:</label><select class="sel" id="rkWalk"><option value="">すべて</option><option value="3">3分以内</option><option value="5">5分以内</option><option value="10">10分以内</option></select></div>
    <div class="filter-group"><label>月額契約:</label><select class="sel" id="rkMonthly"><option value="">すべて</option><option value="yes">あり</option><option value="no">なし</option></select></div>
    <div class="filter-group"><label>時間利用:</label><select class="sel" id="rkTime"><option value="">すべて</option><option value="yes">あり</option><option value="no">なし</option></select></div>
    <div class="filter-group"><label>有人/無人:</label><select class="sel" id="rkStaffed"><option value="">すべて</option><option value="有人">有人</option><option value="無人">無人</option><option value="一部有人">一部有人</option></select></div>
  </div>
  <div id="rkSummary" class="summary-cards"></div>
  <div class="rank-section">
    <div class="rs-header"><div class="rs-title" id="rkTitle">売上ランキング</div><div class="rs-sub" id="rkSub"></div></div>
    <div style="overflow-x:auto;"><table id="rkTable"><thead></thead><tbody></tbody></table></div>
  </div>
</div>

<!-- ==================== ANALYSIS ==================== -->
<div class="panel" id="panel-analysis">
  <div id="analysisContent"></div>
</div>

</div><!-- /main -->

function fmt(n){return Number(n).toLocaleString('ja-JP');}
function fmtY(n){return '¥'+fmt(n);}
function growthHtml(v){
  if(v===null||v===undefined)return'<span class="growth flat">-</span>';
  if(v>0)return'<span class="growth up">+'+v+'%</span>';
  if(v<0)return'<span class="growth down">'+v+'%</span>';
  return'<span class="growth flat">±0%</span>';
}

// ====== MODE SWITCH ======
function switchMode(mode){
  const modes=['compare','ranking','analysis'];
  document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',modes[i]===mode));
  modes.forEach(m=>document.getElementById('panel-'+m).classList.toggle('active',m===mode));
  if(mode==='ranking')renderRanking();
  if(mode==='analysis')renderAnalysis();
}

// ====== COMPARE MODE ======
let cmpSelected=[];

function filterStore(s){
  const q=document.getElementById('cmpSearch').value.toLowerCase();
  const pref=document.getElementById('cmpPref').value;
  const walk=document.getElementById('cmpWalk').value;
  const monthly=document.getElementById('cmpMonthly').value;
  const time=document.getElementById('cmpTime').value;
  if(q&&!s.name.toLowerCase().includes(q)&&!s.corp.toLowerCase().includes(q)&&!(s.pref||'').includes(q))return false;
  if(pref&&s.pref!==pref)return false;
  if(walk&&(s.walk_min===null||s.walk_min>parseInt(walk)))return false;
  if(monthly==='yes'&&!s.monthly_contract)return false;
  if(monthly==='no'&&s.monthly_contract)return false;
  if(time==='yes'&&!s.has_time_usage)return false;
  if(time==='no'&&s.has_time_usage)return false;
  return true;
}

function renderCmpGrid(){
  const sort=document.getElementById('cmpSort').value;
  let list=STORE_LIST.filter(filterStore);
  switch(sort){
    case 'w1_desc':list.sort((a,b)=>b.w1_sales-a.w1_sales);break;
    case 'm3_desc':list.sort((a,b)=>b.m3_total-a.m3_total);break;
    case 'total_desc':list.sort((a,b)=>b.total_sales-a.total_sales);break;
    case 'name':list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));break;
  }
  const grid=document.getElementById('cmpGrid');
  grid.innerHTML='';
  list.forEach(s=>{
    const isSel=cmpSelected.includes(s.id), isDis=!isSel&&cmpSelected.length>=3;
    const btn=document.createElement('div');
    btn.className='store-btn'+(isSel?' selected':'')+(isDis?' disabled':'');
    const tags=[];
    if(s.pref)tags.push(s.pref);
    if(s.walk_min!==null)tags.push('徒歩'+s.walk_min+'分');
    if(s.monthly_contract)tags.push('月額');
    if(s.has_time_usage)tags.push('時間利用');
    const sortVal = sort==='w1_desc' ? fmtY(s.w1_sales)+' /週' : fmtY(s.m3_total)+' /3M';
    btn.innerHTML='<div class="s-check">&#10003;</div>'
      +'<div class="s-name" title="'+s.name+'">'+s.name+'</div>'
      +'<div class="s-sub">'+s.corp+'</div>'
      +(tags.length?'<div class="s-tags">'+tags.map(t=>'<span class="s-tag">'+t+'</span>').join('')+'</div>':'')
      +'<div class="s-amount">'+sortVal+'</div>';
    btn.onclick=()=>{if(!isDis)toggleCmp(s.id);};
    grid.appendChild(btn);
  });
}

function toggleCmp(id){
  const i=cmpSelected.indexOf(id);
  if(i>=0)cmpSelected.splice(i,1);else if(cmpSelected.length<3)cmpSelected.push(id);
  document.getElementById('cmpBadge').textContent='選択: '+cmpSelected.length+' / 3';
  document.getElementById('cmpBadge').className=cmpSelected.length>=3?'badge warn':'badge';
  renderCmpGrid(); renderCmpCards();
}

function getAssessment(s){
  const [dec,jan,feb]=s.m3_sales, t=s.m3_total, w=s.w1_sales;
  if(!feb&&!jan&&!dec&&!w)return{level:'bad',title:'直近利用なし',text:'直近3ヶ月+1週間に売上なし。稼働確認を推奨。'};
  if(w>0&&t===0)return{level:'good',title:'直近活動開始',text:'今週'+fmtY(w)+'の売上。新規稼働の兆候。'};
  const growing=s.growth_feb!==null&&s.growth_feb>10, declining=s.growth_feb!==null&&s.growth_feb<-20;
  if(t>30000&&(growing||!declining)){let txt='3ヶ月売上'+fmtY(t)+'。';if(growing)txt+='2月前月比+'+s.growth_feb+'%成長。';else txt+='安定推移。';if(w>0)txt+='直近1週間'+fmtY(w)+'。';txt+='日平均'+fmtY(s.m3_avg_daily)+'。';return{level:'good',title:'好調',text:txt};}
  if(declining)return{level:'bad',title:'要注意（下降）',text:'2月前月比'+s.growth_feb+'%。直近週'+fmtY(w)+'。改善検討を。'};
  if(feb===0&&jan>0)return{level:'bad',title:'要注意（2月実績なし）',text:'1月'+fmtY(jan)+'→2月なし。'+(w>0?'ただし直近週'+fmtY(w)+'あり。':'')};
  if(feb>0&&jan===0)return{level:'good',title:'回復',text:'2月に'+fmtY(feb)+'の売上復帰。'};
  if(t>10000)return{level:'warn',title:'普通',text:'3ヶ月売上'+fmtY(t)+'。月平均'+fmtY(s.m3_avg_monthly)+'。'};
  return{level:'warn',title:'低調',text:'3ヶ月売上'+fmtY(t)+'。取引頻度・単価向上が課題。'};
}

    if(s.access)infoHtml+='<div class="il">アクセス</div><div class="iv" style="font-size:11px;">'+s.access+'</div>';
    if(s.staffed&&s.staffed!=='不明')infoHtml+='<div class="il">有人/無人</div><div class="iv">'+s.staffed+'</div>';
    if(s.seats)infoHtml+='<div class="il">席数</div><div class="iv">'+s.seats+'席</div>';
    if(s.time_hours)infoHtml+='<div class="il">時間利用</div><div class="iv">'+s.time_hours+'</div>';
    if(s.price_per_min)infoHtml+='<div class="il">1分あたり</div><div class="iv">'+s.price_per_min+'円</div>';

    card.innerHTML=`
      <div class="card-header">
        <div><div class="ch-name">${s.name}</div><div class="ch-corp">${s.corp}</div></div>
        <button class="ch-close" onclick="toggleCmp(${s.id})" title="閉じる">&times;</button>
      </div>
      <div class="card-body">
        <div class="metric-section">
          <div class="metric-section-title">直近1週間（2/24〜3/2）</div>
          <div class="metric-row">
            <div class="metric teal"><div class="m-label">1週間売上</div><div class="m-value">${fmtY(s.w1_sales)}</div><div class="m-sub">${s.w1_count}件</div></div>
            <div class="metric"><div class="m-label">前週比</div><div class="m-value">${growthHtml(s.w1_growth)}</div><div class="m-sub">前週: ${fmtY(s.pw_sales)}</div></div>
          </div>
          <div class="metric-row"><div class="metric"><div class="m-label">日平均（直近1週間）</div><div class="m-value sm">${fmtY(s.w1_avg_daily)}</div></div>
            <div class="metric"><div class="m-label">日平均（直近3ヶ月）</div><div class="m-value sm">${fmtY(s.m3_avg_daily)}</div></div></div>
          <div class="month-bars">
            <div class="mb-row"><div class="mb-lbl">今週</div><div class="mb-trk"><div class="mb-fill cw" style="width:${wMw}%"></div></div><div class="mb-val">${fmtY(s.w1_sales)}</div><div class="mb-cnt">${s.w1_count}件</div></div>
            <div class="mb-row"><div class="mb-lbl">前週</div><div class="mb-trk"><div class="mb-fill c1" style="width:${pwMw}%"></div></div><div class="mb-val">${fmtY(s.pw_sales)}</div><div class="mb-cnt"></div></div>
          </div>
        </div>
        <div class="metric-section">
          <div class="metric-section-title">直近3ヶ月（12月〜2月）</div>
          <div class="metric-row">
            <div class="metric hl"><div class="m-label">3ヶ月売上</div><div class="m-value">${fmtY(s.m3_total)}</div><div class="m-sub">${s.m3_count[0]+s.m3_count[1]+s.m3_count[2]}件</div></div>
            <div class="metric"><div class="m-label">前月比 (1→2月)</div><div class="m-value">${growthHtml(s.growth_feb)}</div><div class="m-sub">12→1月: ${growthHtml(s.growth_jan)}</div></div>
          </div>
        </div>
        <div class="metric-section">
          <div class="metric-section-title">平均指標</div>
          <div class="metric-row cols-3">
            <div class="metric"><div class="m-label">月平均(3M)</div><div class="m-value sm">${fmtY(s.m3_avg_monthly)}</div></div>
            <div class="metric"><div class="m-label">週平均(3M)</div><div class="m-value sm">${fmtY(s.m3_avg_weekly)}</div></div>
            <div class="metric"><div class="m-label">日平均(3M)</div><div class="m-value sm">${fmtY(s.m3_avg_daily)}</div></div>

          <div class="metric-row cols-3" style="margin-top:0;">

        </div>
        <div class="metric-section">
          <div class="metric-section-title">月別売上</div>
          <div class="month-bars">
            ${['12月','1月','2月'].map((l,i)=>{const w=maxM3>0?Math.max((s.m3_sales[i]/maxM3)*100,0):0;const mw=s.m3_sales[i]>0?Math.max(w,8):0;return'<div class="mb-row"><div class="mb-lbl">'+l+'</div><div class="mb-trk"><div class="mb-fill c'+i+'" style="width:'+mw+'%"></div></div><div class="mb-val">'+fmtY(s.m3_sales[i])+'</div><div class="mb-cnt">'+s.m3_count[i]+'件</div></div>';}).join('')}
          </div>
        </div>

            <div class="metric"><div class="m-label">売上合計</div><div class="m-value sm">${fmtY(s.total_sales)}</div><div class="m-sub">${s.total_count}件</div></div>
            <div class="metric"><div class="m-label">稼働月数</div><div class="m-value sm">${s.active_months}ヶ月</div></div>
            <div class="metric"><div class="m-label">取引単価</div><div class="m-value sm">${fmtY(s.avg_per_tx)}</div></div>

        <div class="metric-section"><div class="metric-section-title">店舗情報</div>${infoHtml}</div>

    grid.appendChild(card);

}

// ====== RANKING MODE ======
function getStoreSalesForPeriod(s,period){
  if(period==='all')return{sales:s.total_sales,count:s.total_count};
  if(period==='3m')return{sales:s.m3_total,count:s.m3_count[0]+s.m3_count[1]+s.m3_count[2]};
  if(period==='1w')return{sales:s.w1_sales,count:s.w1_count};
  const m=s.monthly[period];
  return m?{sales:m.sales,count:m.count}:{sales:0,count:0};
}
function getDaysForPeriod(period){
  if(period==='all')return null;
  if(period==='3m')return 90;
  if(period==='1w')return 7;
  const[y,m]=period.split('-').map(Number);
  return new Date(y,m,0).getDate();
}

function renderRanking(){
  const period=document.getElementById('rkPeriod').value;
  const pref=document.getElementById('rkPref').value;
  const walk=document.getElementById('rkWalk').value;
  const monthly=document.getElementById('rkMonthly').value;
  const time=document.getElementById('rkTime').value;
  const staffed=document.getElementById('rkStaffed').value;

  let list=STORE_LIST.filter(s=>{
    if(pref&&s.pref!==pref)return false;
    if(walk&&(s.walk_min===null||s.walk_min>parseInt(walk)))return false;
    if(monthly==='yes'&&!s.monthly_contract)return false;
    if(monthly==='no'&&s.monthly_contract)return false;
    if(time==='yes'&&!s.has_time_usage)return false;
    if(time==='no'&&s.has_time_usage)return false;
    if(staffed&&s.staffed!==staffed)return false;
    return true;
  });

  let rows=list.map(s=>{const d=getStoreSalesForPeriod(s,period);return{...s,p_sales:d.sales,p_count:d.count};}).filter(r=>r.p_sales>0);
  rows.sort((a,b)=>b.p_sales-a.p_sales);

  const days=getDaysForPeriod(period);
  const totalSales=rows.reduce((a,r)=>a+r.p_sales,0);
  const totalCount=rows.reduce((a,r)=>a+r.p_count,0);
  const storeCount=rows.length;

  const periodLabels={'all':'全期間','3m':'直近3ヶ月 (12〜2月)','1w':'直近1週間 (2/24〜3/2)','2026-02':'2026年2月','2026-01':'2026年1月','2025-12':'2025年12月','2025-11':'2025年11月','2025-10':'2025年10月'};
  document.getElementById('rkTitle').textContent=(periodLabels[period]||period)+' 売上ランキング';
  document.getElementById('rkSub').textContent=storeCount+'店舗（売上あり）';

  let sumHtml=`<div class="scard hl"><div class="sc-label">売上合計</div><div class="sc-val">${fmtY(totalSales)}</div><div class="sc-sub">${fmt(totalCount)}件</div></div>
    <div class="scard"><div class="sc-label">店舗数</div><div class="sc-val">${storeCount}</div></div>
    <div class="scard"><div class="sc-label">平均取引単価</div><div class="sc-val">${totalCount>0?fmtY(Math.round(totalSales/totalCount)):'-'}</div></div>
    <div class="scard"><div class="sc-label">店舗平均売上</div><div class="sc-val">${storeCount>0?fmtY(Math.round(totalSales/storeCount)):'-'}</div></div>`;
  if(days){
    sumHtml+=`<div class="scard"><div class="sc-label">月平均</div><div class="sc-val">${fmtY(Math.round(totalSales/(days/30)))}</div></div>
      <div class="scard"><div class="sc-label">週平均</div><div class="sc-val">${fmtY(Math.round(totalSales/(days/7)))}</div></div>
      <div class="scard"><div class="sc-label">日平均</div><div class="sc-val">${fmtY(Math.round(totalSales/days))}</div></div>`;
  }
  document.getElementById('rkSummary').innerHTML=sumHtml;

  const thead=document.querySelector('#rkTable thead'), tbody=document.querySelector('#rkTable tbody');
  const hasDays=!!days;
  thead.innerHTML='<tr><th class="c">順位</th><th>店舗名</th><th>法人</th><th>都道府県</th><th class="c">徒歩</th><th class="c">有人/無人</th><th class="c">月額</th><th class="c">時間利用</th><th class="r">売上</th><th class="r">件数</th><th class="r">単価</th>'
    +(hasDays?'<th class="r">月平均</th><th class="r">週平均</th><th class="r">日平均</th>':'<th class="r">月平均</th>')
    +'<th class="r">シェア</th></tr>';

  let tb='';
  rows.forEach((r,i)=>{
    const rank=i+1, rc=rank<=3?' rank-'+rank:'';
    const share=totalSales>0?((r.p_sales/totalSales)*100).toFixed(1):'0';
    const avg=r.p_count>0?Math.round(r.p_sales/r.p_count):0;
    let avgC='';
    if(hasDays)avgC='<td class="r">'+fmtY(Math.round(r.p_sales/(days/30)))+'</td><td class="r">'+fmtY(Math.round(r.p_sales/(days/7)))+'</td><td class="r">'+fmtY(Math.round(r.p_sales/days))+'</td>';
    else avgC='<td class="r">'+fmtY(r.avg_monthly)+'</td>';
    tb+='<tr><td class="rank-num'+rc+'">'+rank+'</td><td>'+r.name+'</td><td style="font-size:11px;color:var(--g500);">'+r.corp+'</td><td><span class="pref-badge">'+(r.pref||'-')+'</span></td><td class="c">'+(r.walk_min!==null?'<span class="walk-badge">'+r.walk_min+'分</span>':'-')+'</td><td class="c" style="font-size:11px;">'+(r.staffed||'-')+'</td><td class="c">'+(r.monthly_contract?'〇':'')+'</td><td class="c">'+(r.has_time_usage?'〇':'')+'</td><td class="r" style="font-weight:700;">'+fmtY(r.p_sales)+'</td><td class="r">'+r.p_count+'</td><td class="r">'+fmtY(avg)+'</td>'+avgC+'<td class="r">'+share+'%</td></tr>';
  });
  const tAvg=totalCount>0?Math.round(totalSales/totalCount):0;
  let tAvgC='';
  if(hasDays)tAvgC='<td class="r">'+fmtY(Math.round(totalSales/(days/30)))+'</td><td class="r">'+fmtY(Math.round(totalSales/(days/7)))+'</td><td class="r">'+fmtY(Math.round(totalSales/days))+'</td>';
  else tAvgC='<td class="r">-</td>';
  tb+='<tr class="total-row"><td></td><td>合計</td><td></td><td></td><td></td><td></td><td></td><td></td><td class="r">'+fmtY(totalSales)+'</td><td class="r">'+totalCount+'</td><td class="r">'+fmtY(tAvg)+'</td>'+tAvgC+'<td class="r">100%</td></tr>';
  tbody.innerHTML=tb;
}

['rkPeriod','rkPref','rkWalk','rkMonthly','rkTime','rkStaffed'].forEach(id=>{
  document.getElementById(id).addEventListener('change',renderRanking);
});

// ====== ANALYSIS MODE ======
function renderAnalysis(){
  const el=document.getElementById('analysisContent');
  let h='';

  function renderAttrSection(title, groups, desc){
    const total3m = groups.reduce((a,g)=>a+g.sales_3m,0);
    const totalW1 = groups.reduce((a,g)=>a+g.sales_w1,0);
    const colors = ['#6366f1','#a855f7','#ec4899','#f59e0b'];

    h+='<div class="analysis-section"><h3>'+title+'</h3>';
    if(desc) h+='<p style="font-size:13px;color:var(--g500);margin-bottom:14px;">'+desc+'</p>';

    // Bar chart: 3M share
    h+='<div class="attr-bar-wrap"><div class="attr-bar-label"><span>直近3ヶ月 売上シェア</span><span>'+fmtY(total3m)+'</span></div><div class="attr-bar-track">';
    groups.forEach((g,i)=>{
      const pct=total3m>0?((g.sales_3m/total3m)*100):0;
      if(pct>0) h+='<div class="attr-bar-seg" style="width:'+Math.max(pct,3)+'%;background:'+colors[i%4]+'">'+g.label+' '+pct.toFixed(0)+'%</div>';
    });
    h+='</div></div>';

    // Bar chart: 1W share
    if(totalW1>0){
      h+='<div class="attr-bar-wrap" style="margin-top:10px;"><div class="attr-bar-label"><span>直近1週間 売上シェア</span><span>'+fmtY(totalW1)+'</span></div><div class="attr-bar-track">';
      groups.forEach((g,i)=>{
        const pct=totalW1>0?((g.sales_w1/totalW1)*100):0;
        if(pct>0) h+='<div class="attr-bar-seg" style="width:'+Math.max(pct,3)+'%;background:'+colors[i%4]+'">'+g.label+' '+pct.toFixed(0)+'%</div>';
      });
      h+='</div></div>';
    }

    // Cards
    h+='<div class="attr-grid cols-'+Math.min(groups.length,4)+'" style="margin-top:14px;">';
    groups.forEach(g=>{
      h+='<div class="attr-card">';
      h+='<div class="ac-title">'+g.label+'</div>';
      h+='<div class="ac-big">'+fmtY(g.sales_3m)+'</div>';
      h+='<div class="ac-sub">直近3ヶ月 / '+g.n+'店舗 (稼働'+g.active_3m+')</div>';
      h+='<div class="ac-rows">';
      h+='<div class="ac-row"><div class="ac-l">店舗平均(3M)</div><div class="ac-v">'+fmtY(g.avg_sales_3m)+'</div></div>';
      h+='<div class="ac-row"><div class="ac-l">取引単価(3M)</div><div class="ac-v">'+fmtY(g.avg_tx_3m)+'</div></div>';
      h+='<div class="ac-row"><div class="ac-l">直近1週間</div><div class="ac-v">'+fmtY(g.sales_w1)+' ('+g.count_w1+'件)</div></div>';
      h+='<div class="ac-row"><div class="ac-l">店舗平均(1W)</div><div class="ac-v">'+fmtY(g.avg_sales_w1)+'</div></div>';
      h+='<div class="ac-row"><div class="ac-l">12月</div><div class="ac-v">'+fmtY(g.m_dec)+'</div></div>';
      h+='<div class="ac-row"><div class="ac-l">1月</div><div class="ac-v">'+fmtY(g.m_jan)+'</div></div>';
      h+='<div class="ac-row"><div class="ac-l">2月</div><div class="ac-v">'+fmtY(g.m_feb)+'</div></div>';
      h+='<div class="ac-row"><div class="ac-l">全期間</div><div class="ac-v">'+fmtY(g.sales_all)+' ('+g.count_all+'件)</div></div>';
      h+='</div></div>';
    });
    h+='</div>';

    // Insight
    if(groups.length===2){
      const a=groups[0], b=groups[1];
      const diff3m = a.avg_sales_3m - b.avg_sales_3m;
      const diffW1 = a.avg_sales_w1 - b.avg_sales_w1;
      const pctDiff = b.avg_sales_3m>0 ? Math.round((diff3m/b.avg_sales_3m)*100) : 0;
      const better = diff3m>0 ? a.label : b.label;
      const cls = Math.abs(pctDiff)>30 ? (diff3m>0?'positive':'negative') : 'neutral';
      h+='<div class="insight-box '+cls+'">';
      h+='<strong>分析:</strong> 店舗平均売上(3ヶ月)は <strong>'+a.label+'</strong> が '+fmtY(a.avg_sales_3m)+' vs <strong>'+b.label+'</strong> が '+fmtY(b.avg_sales_3m);
      if(pctDiff!==0) h+=' (<strong>'+better+'</strong>が'+Math.abs(pctDiff)+'%高い)';
      h+='。直近1週間では '+a.label+' '+fmtY(a.avg_sales_w1)+' vs '+b.label+' '+fmtY(b.avg_sales_w1)+'。';
      // Trend
      const aTrend = a.m_feb - a.m_jan;
      const bTrend = b.m_feb - b.m_jan;
      if(aTrend>0&&bTrend<0) h+=' '+a.label+'は上昇傾向、'+b.label+'は下降傾向。';
      else if(aTrend<0&&bTrend>0) h+=' '+b.label+'は上昇傾向、'+a.label+'は下降傾向。';
      h+='</div>';
    }
    h+='</div>';
  }

  renderAttrSection('時間利用の有無による売上比較', ANALYSIS.time_usage,
    '「時間利用営業時間」が設定されている店舗 vs 未設定の店舗を比較');

  renderAttrSection('月額契約の有無による売上比較', ANALYSIS.monthly_contract,
    '月額契約プランを提供している店舗 vs 提供していない店舗を比較');

  renderAttrSection('有人/無人による売上比較', ANALYSIS.staffed,
    '店舗の運営形態（有人・無人・一部有人）別の売上比較');

  renderAttrSection('駅からの徒歩時間別 売上比較', ANALYSIS.walk,
    'アクセスの良さ（最寄駅からの徒歩時間）と売上の関係');

  el.innerHTML=h;
}

</script>
